name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-release:
    name: Build + Publish to PyPI + GitHub Release
    runs-on: ubuntu-latest
    # `id-token: write` enables PyPI Trusted Publishing (OIDC — no API token secret needed).
    # `contents: write` lets softprops/action-gh-release create the GitHub Release.
    permissions:
      contents: write
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/claude-pdf2md-ocr
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Verify tag matches package version
        # Parse __version__ with a regex so this step works without installing
        # the package itself (which would pull pytesseract/Pillow into the
        # release job for no reason — the build step does that on its own).
        run: |
          PACKAGE_VERSION=$(python -c "import re, pathlib; print(re.search(r'__version__\s*=\s*\"([^\"]+)\"', pathlib.Path('claude_pdf2md_ocr/__init__.py').read_text()).group(1))")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "tag=$TAG_VERSION package=$PACKAGE_VERSION"
          test "$PACKAGE_VERSION" = "$TAG_VERSION"
      - name: Build sdist + wheel
        run: python -m build
      - name: Twine metadata check
        run: twine check dist/*
      - name: Publish to PyPI (Trusted Publisher / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
